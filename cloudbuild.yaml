# Cloud Build CI/CD pipeline for WisePlatform ERP
# Builds and deploys API + Web services to Cloud Run

steps:
  # ── Step 1: Build API image ────────────────────────────────────────
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-api:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-api:latest
      - -f
      - packages/api/Dockerfile
      - .

  # ── Step 2: Build Web image ────────────────────────────────────────
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-web:$COMMIT_SHA
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-web:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_API_URL}
      - -f
      - apps/web/Dockerfile
      - .

  # ── Step 3: Push API images ────────────────────────────────────────
  - id: push-api
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-api
    waitFor:
      - build-api

  # ── Step 4: Push Web images ────────────────────────────────────────
  - id: push-web
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-web
    waitFor:
      - build-web

  # ── Step 5: Deploy API to Cloud Run ────────────────────────────────
  - id: deploy-api
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - wise-api
      - --image
      - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-api:$COMMIT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
    waitFor:
      - push-api

  # ── Step 6: Deploy Web to Cloud Run ────────────────────────────────
  - id: deploy-web
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - wise-web
      - --image
      - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-web:$COMMIT_SHA
      - --region
      - asia-south1
      - --platform
      - managed
    waitFor:
      - push-web

substitutions:
  _API_URL: https://wise-api-365076343379.asia-south1.run.app/api/v1

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-api:$COMMIT_SHA
  - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-api:latest
  - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-web:$COMMIT_SHA
  - asia-south1-docker.pkg.dev/$PROJECT_ID/wise-images/wise-web:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
