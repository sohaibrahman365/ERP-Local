version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wise_platform
      POSTGRES_USER: wise_user
      POSTGRES_PASSWORD: wise_dev_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: wise-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: wise_search_key_2026
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data

  minio:
    image: minio/minio:latest
    container_name: wise-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: wise_minio_user
      MINIO_ROOT_PASSWORD: wise_minio_password_2026
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
